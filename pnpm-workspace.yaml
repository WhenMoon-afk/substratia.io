packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@xmldom/xmldom": 0.8.13
  flatted: 3.4.2
  lodash: 4.18.1
  node-forge: 1.4.0
  postcss: 8.5.14
  tar: 7.5.13
  undici: 6.24.1
  "ws@>=8.0.0 <8.20.1": 8.20.1

allowBuilds:
  "@clerk/shared": true
  better-sqlite3: true
  browser-tabs-lock: true
  bufferutil: true
  core-js: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true

peerDependencyRules:
  allowedVersions:
    utf-8-validate: "6"
    ws: "7 || 8"
